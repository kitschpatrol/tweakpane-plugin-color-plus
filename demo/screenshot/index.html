<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Tweakpane Color Plus</title>
		<style>
			/* Pane Sizes */
			:root {
				--tp-blade-value-width: 65%;
			}

			/* Side-by-side */
			body {
				display: flex;
				flex-wrap: wrap;
				align-items: center;
				justify-content: center;
				min-height: 100vh;
				margin: 0;
				padding: 0;
				background: linear-gradient(
					in oklch 135deg,
					oklch(60% 0.26 11deg),
					oklch(60% 0.26 11deg / 50%)
				);
				background-color: black;
			}

			.box {
				flex: 1 1 300px;
				max-width: 400px;
				min-height: 100px;
				padding: 20px;
			}

			#plus {
				border-radius: 6px;
				box-shadow: 0 20px 40px rgb(0 0 0 / 30%);
			}
		</style>
		<script src="./index.ts" type="module"></script>
	</head>
	<body>
		<div class="box">
			<div id="plus-inputs"></div>
		</div>
		<div class="box">
			<div id="plus-palettes"></div>
		</div>
	</body>
</html>
